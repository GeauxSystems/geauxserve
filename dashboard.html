<script>
    // Configuration
    const API_URL = 'https://script.google.com/macros/s/AKfycbwOaA0sKeTPTKFq6_LyTmXmRiEnPOfgnIpsJ6Ofe92tCEssDIiP9y0SV56EZ8vmYxZJ/exec';
    const LDAF_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1573Lc2r18S36QQXsrh-iUlmjNd4aIFkbcNabEtHqkb8/edit';
    const REFRESH_INTERVAL = 30000; // 30 seconds

    let refreshTimer;
    let currentServedCount = 0;

    // Initialize dashboard
    async function init() {
      await loadDashboardData();
      setupAutoRefresh();
      setupExportButtons();
      setupResetButton();
    }

    // Load dashboard data from API
    async function loadDashboardData() {
      try {
        const response = await fetch(`${API_URL}?action=getDashboardData`);
        const data = await response.json();

        if (data.success) {
          updateDashboard(data);
          showMainContent();
        } else {
          showError(data.message || 'Failed to load data');
        }
      } catch (error) {
        console.error('Error loading dashboard:', error);
        showError('Network error. Retrying...');
      }

      updateLastUpdated();
    }

    // Update dashboard with data
    function updateDashboard(data) {
      // Store served count for reset modal
      currentServedCount = data.servedToday || 0;

      // Update header
      const isLive = data.isLive || false;
      const statusBadge = document.getElementById('statusBadge');
      const statusText = document.getElementById('statusText');
      const header = document.querySelector('.header');
      
      if (isLive) {
        statusBadge.classList.add('live');
        statusText.textContent = 'LIVE';
        header.classList.add('live');
      } else {
        statusBadge.classList.remove('live');
        statusBadge.classList.add('complete');
        statusText.textContent = 'COMPLETE';
        header.classList.remove('live');
      }

      document.getElementById('distributionTitle').textContent = data.title || 'Distribution Dashboard';
      document.getElementById('distributionTime').textContent = data.timeRange || '';

      // Main metric
      document.getElementById('servedCount').textContent = data.servedToday || 0;
      document.getElementById('peopleCount').textContent = `${data.totalPeople || 0} people`;

      // Stats
      document.getElementById('currentPace').textContent = data.currentPace || '--';
      document.getElementById('projectedFinish').textContent = data.projectedFinish || '--';
      document.getElementById('inLineCount').textContent = data.inLine || 0;

      // Alerts
      updateAlerts(data.alerts || []);

      // Recent activity
      updateActivity(data.recentActivity || []);
    }

    // Update alerts section
    function updateAlerts(alerts) {
      const container = document.getElementById('alertsContainer');
      
      if (alerts.length === 0) {
        container.innerHTML = '<div class="no-alerts">✓ No issues detected</div>';
        return;
      }

      container.innerHTML = alerts.map(alert => `
        <div class="alert-item">
          <div class="alert-text">${alert}</div>
        </div>
      `).join('');
    }

    // Update activity feed
    function updateActivity(activities) {
      const container = document.getElementById('activityContainer');
      
      if (activities.length === 0) {
        container.innerHTML = '<div class="no-alerts">No activity yet</div>';
        return;
      }

      container.innerHTML = activities.map(activity => `
        <div class="activity-item">
          <div>
            <div class="name">${activity.name}</div>
            <div class="action">${activity.action}</div>
          </div>
          <div class="time">${activity.time}</div>
        </div>
      `).join('');
    }

    // Show main content, hide loading
    function showMainContent() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }

    // Show error message
    function showError(message) {
      const loadingState = document.getElementById('loadingState');
      loadingState.innerHTML = `
        <div class="loading-spinner"></div>
        <p>${message}</p>
      `;
    }

    // Update last updated time
    function updateLastUpdated() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { 
        hour: 'numeric', 
        minute: '2-digit',
        hour12: true 
      });
      document.getElementById('lastUpdated').textContent = `Last updated: ${timeStr}`;
    }

    // Setup auto-refresh
    function setupAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(loadDashboardData, REFRESH_INTERVAL);
    }

    // Setup export buttons
    function setupExportButtons() {
      document.getElementById('exportLDAF').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(LDAF_SHEET_URL, '_blank');
      });

      document.getElementById('exportActivity').addEventListener('click', (e) => {
        e.preventDefault();
        alert('Distribution Log export coming soon');
      });
    }

    // ========= DASHBOARD RESET FUNCTIONALITY =========

    function setupResetButton() {
      document.getElementById('resetButton').addEventListener('click', showResetModal);
      document.getElementById('resetCancelBtn').addEventListener('click', hideResetModal);
      document.getElementById('resetConfirmBtn').addEventListener('click', handleResetConfirm);
      
      // Close modal on overlay click
      document.getElementById('resetModal').addEventListener('click', (e) => {
        if (e.target.id === 'resetModal') hideResetModal();
      });

      // Enter key submits PIN
      document.getElementById('resetPinInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleResetConfirm();
      });
    }

    function showResetModal() {
      const modal = document.getElementById('resetModal');
      const pinInput = document.getElementById('resetPinInput');
      const pinError = document.getElementById('resetPinError');
      
      // Update stats in modal
      document.getElementById('resetServedCount').textContent = currentServedCount;
      
      // Clear previous input
      pinInput.value = '';
      pinError.style.display = 'none';
      
      // Show modal
      modal.style.display = 'flex';
      
      // Focus PIN input after animation
      setTimeout(() => pinInput.focus(), 300);
    }

    function hideResetModal() {
      document.getElementById('resetModal').style.display = 'none';
    }

    async function handleResetConfirm() {
      const pin = document.getElementById('resetPinInput').value;
      const pinError = document.getElementById('resetPinError');
      const confirmBtn = document.getElementById('resetConfirmBtn');
      
      if (!pin || pin.length !== 4) {
        pinError.style.display = 'block';
        return;
      }
      
      // Disable button during API call
      confirmBtn.disabled = true;
      confirmBtn.textContent = 'Resetting...';
      
      try {
        const response = await fetch(`${API_URL}?action=resetDashboard&pin=${pin}`);
        const data = await response.json();
        
        if (data.success) {
          // Show what actually happened
          const message = `Reset complete!\n\nProcessed: ${data.processed || 0} contacts\nErrors: ${data.errors || 0}`;
          alert(message);
          
          // Show success message
          confirmBtn.textContent = '✓ Reset Complete';
          confirmBtn.style.background = '#28a745';
          
          // Wait for GHL to propagate changes (3 seconds)
          setTimeout(() => {
            hideResetModal();
            
            // Show loading state
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('loadingState').innerHTML = `
              <div class="loading-spinner"></div>
              <p>Refreshing dashboard data...</p>
            `;
            
            // Wait another 2 seconds, then reload fresh data
            setTimeout(() => {
              loadDashboardData();
            }, 2000);
          }, 1000);
        } else {
          // Show error
          pinError.textContent = data.message || 'Invalid PIN. Please try again.';
          pinError.style.display = 'block';
          confirmBtn.disabled = false;
          confirmBtn.textContent = 'Reset Distribution';
          
          // Clear PIN input
          document.getElementById('resetPinInput').value = '';
          document.getElementById('resetPinInput').focus();
        }
      } catch (error) {
        console.error('Reset error:', error);
        pinError.textContent = 'Network error. Please try again.';
        pinError.style.display = 'block';
        confirmBtn.disabled = false;
        confirmBtn.textContent = 'Reset Distribution';
      }
    }

    // Start the dashboard
    init();
</script>
